name: Build Desktop Clients

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build desktop package
        run: npm run desktop:dist

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.blockmap
            release/*.yml

      - name: Attach files to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: 夜巡录：荒庙篇 ${{ github.ref_name }}
          prerelease: true
          body: |
            《夜巡录：荒庙篇》第一关竖切 demo 客户端测试包。

            本版本包含标题页、分岔地图、普通战、精英战、怪事、商店、休整、Boss 战、战利品与结算视频。

            macOS 包目前使用 ad-hoc 签名，没有 Apple 公证。如果提示“无法验证开发者”，请右键点击应用，选择“打开”。

            Windows 包如果触发 SmartScreen，请点击“更多信息” -> “仍要运行”。
          files: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.blockmap
            release/*.yml
